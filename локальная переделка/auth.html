<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-image: url('backgrounds/background.png');">
    <div class="question-container">
        <form id="authForm">
            <div>
                <h3 for="nickname">Имя пользователя:</h3>
                <input type="text" id="nickname" name="nickname" required class="option-field" style="color: black; width: 96%; margin-bottom: 10px;">
            </div>
            <div>
                <h3 for="passwd">Пароль:</h3>
                <input type="password" id="passwd" name="passwd" required class="option-field" style="color: black; width: 96%; margin-bottom: 10px;">
            </div>
            <div class="button-row">
                <button type="submit" class="button" id="authbutton">Войти</button>
                <button type="button" onclick="window.location.href='regform.html'" class="button" id="regbutton">Зарегистрироваться</button>
            </div>
        </form>
        <div id="result-message"></div>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nickname = document.getElementById('nickname').value;
            const passwd = document.getElementById('passwd').value;

            // Чтение пользователей из localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.nickname === nickname);

            if (!user) {
                document.getElementById('result-message').innerHTML = '<div class="result-message" style="color: #e74c3c;">Пользователь не найден.</div>';
                return;
            }

            if (user.passwd === passwd) {
                localStorage.setItem('nickname', nickname);
                document.getElementById('result-message').innerHTML = '<div class="result-message" style="color: #2ecc71;">Авторизация успешна!</div>';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                document.getElementById('result-message').innerHTML = '<div class="result-message" style="color: #e74c3c;">Неверный пароль.</div>';
            }
        });
    </script>
</body>
</html>
