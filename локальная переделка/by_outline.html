    <title>Угадай страну по очертанию</title>

</head>
<body style="background-image: url('backgrounds/background_line.png');">
    <div class="header">
        <div class="score">Счёт: <span id="score-value">0</span></div>
        <div class="timer">Время: <span id="timer-value">15</span></div>
    </div>
    <h1></h1>
    <h1></h1>
    <div class="question-container">

        <div style="text-align: center; margin-bottom: 20px;">
            <img id="outline-image" src="" alt="Очертание страны" style="max-width: 200%; max-height: 300px; border-radius: 5px;">
        </div>
        <div class="options" id="options-container"></div>
    </div>

vietnam.png|Вьетнам|Таиланд|Лаос|Камбоджа
        `.trim();

        // Переменные для игры
        let score = 0;
        let timer;
        let timeLeft = 15;
        let currentQuestion = {};
        let questions = [];
        let usedQuestionsIndices = [];
        const maxQuestions = 25;
        let questionCount = 0;
        const nickname = localStorage.getItem('nickname');
        const gamemode = "по очертанию";

        // Проверка авторизации
        if (!nickname) {
            window.location.href = 'auth.html';
        }

        // Загрузка данных об очертаниях
        function loadOutlines() {
            const lines = outlinesData.split('\n');
            lines.forEach(line => {
                if (line.trim() !== '') {
                    const parts = line.split('|');
                    if (parts.length === 5) {
                        questions.push({
                            outline: parts[0].trim(),
                            correctAnswer: parts[1].trim(),
                            options: parts.slice(1).map(opt => opt.trim())
                        });
                    }
                }
            });
            if (questions.length < maxQuestions) {
                alert(`В файле недостаточно вопросов. Требуется минимум ${maxQuestions} вопросов.`);
                return;
            }
            nextQuestion();
        }

        // Функция для выбора случайного вопроса
        function getRandomQuestion() {
            if (usedQuestionsIndices.length >= questions.length) {
                usedQuestionsIndices = [];
            }
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * questions.length);
            } while (usedQuestionsIndices.includes(randomIndex));
            usedQuestionsIndices.push(randomIndex);
            return questions[randomIndex];
        }

        // Функция для запуска таймера
        function startTimer() {
            timeLeft = 15;
            document.getElementById('timer-value').textContent = timeLeft;
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-value').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    showResult(false);
                }
            }, 1000);
        }

        // Функция для отображения результата
        function showResult(isCorrect) {
            const resultMessage = document.getElementById('result-message');
            if (isCorrect) {
                const points = Math.floor(timeLeft);
                score += points;
                document.getElementById('score-value').textContent = score;
                resultMessage.textContent = `Правильно! +${points} баллов`;
                resultMessage.style.color = "#2ecc71";
            } else {
                resultMessage.textContent = `Правильный ответ: ${currentQuestion.correctAnswer}`;
                resultMessage.style.color = "#e74c3c";
            }
            setTimeout(nextQuestion, 2000);
        }

        // Функция для генерации вопроса
        function generateQuestion() {
            currentQuestion = getRandomQuestion();
            const outlineImage = document.getElementById('outline-image');
            outlineImage.src = `outlines/${currentQuestion.outline}`;
            document.getElementById('result-message').textContent = '';
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            const shuffledOptions = [...currentQuestion.options].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = option;
                button.onclick = () => {
                    clearInterval(timer);
                    if (option === currentQuestion.correctAnswer) {
                        showResult(true);
                    } else {
                        showResult(false);
                    }
                };
                optionsContainer.appendChild(button);
            });
        }

        // Функция для перехода к следующему вопросу
        function nextQuestion() {
            questionCount++;
            if (questionCount <= maxQuestions) {
                generateQuestion();
                startTimer();
            } else {
                saveScore();
            }
        }

        // Функция для сохранения счёта
        function saveScore() {
            const currentDate = new Date().toISOString().slice(0, 19).replace('T', ' ');
            let playersData = JSON.parse(localStorage.getItem('playersData')) || [];

            const existingRecordIndex = playersData.findIndex(
                record => record.nickname === nickname && record.gamemode === gamemode
            );

            if (existingRecordIndex !== -1) {
                if (score > playersData[existingRecordIndex].bestscore) {
                    playersData[existingRecordIndex].bestscore = score;
                    playersData[existingRecordIndex].date = currentDate;
                }
                playersData[existingRecordIndex].temp = score;
            } else {
                playersData.push({
                    nickname,
                    gamemode,
                    bestscore: score,
                    temp: score,
                    date: currentDate
                });
            }

            localStorage.setItem('playersData', JSON.stringify(playersData));
            window.location.href = `result.html?gamemode=${encodeURIComponent(gamemode)}`;
        }

        // Запуск игры
        loadOutlines();
    </script>
</body>
</html>
